[settings]
# tools のバージョン・checksum・URL を mise.lock に固定する。
# 更新は `mise run update`（または `mise upgrade`）で行う。
# このファイルは [dotfiles] で ~/.config/mise/config.toml に symlink されるため、
# mise のグローバル設定として全プロジェクトに適用される（このリポジトリ内に閉じない）。
lockfile = true

[tools]
# dev
uv = "latest"
node = "latest"

# terminal
starship = "latest"
herdr = "latest"

# cli
ripgrep = "latest"
fd = "latest"
fzf = "latest"
eza = "latest"
# NOTE: JSON/YAML の値確認は jq/yq から jaq (Rust) に統一。未導入時は各スクリプトが jq にフォールバックする。
jaq = "latest"
hyperfine = "latest"
"github:halkn/docsail" = { version = "latest", minimum_release_age = "0s" }

# vcs
gh = "latest"
ghq = "latest"
delta = "latest"
# NOTE: diff レビューは diffnav -> codediff.nvim -> hunk と移行。
"npm:hunkdiff" = "latest"

# editor
neovim = "nightly"
tree-sitter = "latest"

# LSP / Linter / Formatter
"pipx:ryl" = "latest"
rumdl = "latest"
# NOTE: yaml は ryl (lint + format) に統一。
