# ── 基本設定 ─────────────────────────────────────────
set -g default-shell /bin/zsh
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g history-limit 50000

# detach on force close (zellijの on_force_close "detach" に相当)
set -g detach-on-destroy on

# ターミナルカラー
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── プレフィックス: Ctrl-Space (Neovim との衝突を避ける) ──
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── ペイン分割 ───────────────────────────────────────
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -l 70% -c "#{pane_current_path}"

# ── ウィンドウ操作 ────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind n next-window
bind p previous-window
bind d detach-client
bind z resize-pane -Z

# ── ペイン移動 (vim風) ────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── ペインリサイズ ────────────────────────────────────
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ── スクロール / コピーモード ──────────────────────────
set -g mode-keys vi
bind [ copy-mode

bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q      send-keys -X cancel
bind -T copy-mode-vi j      send-keys -X cursor-down
bind -T copy-mode-vi k      send-keys -X cursor-up
bind -T copy-mode-vi C-d    send-keys -X halfpage-down
bind -T copy-mode-vi C-u    send-keys -X halfpage-up
bind -T copy-mode-vi /      command-prompt -p "検索:" "send-keys -X search-forward '%%'"
bind -T copy-mode-vi n      send-keys -X search-again
bind -T copy-mode-vi N      send-keys -X search-reverse

# ── レイアウト ────────────────────────────────────────
bind D run-shell "${XDG_CONFIG_HOME}/tmux/claude-layout.sh"

# ── セッション管理 ────────────────────────────────────
bind s choose-session
bind r source-file "${XDG_CONFIG_HOME}/tmux/tmux.conf" \; display "Reloaded"

# ── ステータスバー (iceberg-dark テーマ) ──────────────
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#161821,fg=#c6c8d1"

# 左: セッション名
set -g status-left-length 30
set -g status-left "#[bg=#84a0c6,fg=#161821,bold] #S #[bg=#161821,fg=#84a0c6]"

# 右: 日時
set -g status-right-length 40
set -g status-right "#[fg=#6b7089] %Y-%m-%d %H:%M "

# ウィンドウリスト
set -g window-status-style "bg=#161821,fg=#6b7089"
set -g window-status-format " #I:#W "
set -g window-status-current-style "bg=#1e2132,fg=#84a0c6,bold"
set -g window-status-current-format "#[fg=#161821,bg=#1e2132]#[fg=#84a0c6,bg=#1e2132,bold] #I:#W #[fg=#1e2132,bg=#161821]"

# ── ペインボーダー (zellijの pane_frames false に相当) ──
set -g pane-border-style "fg=#1e2132"
set -g pane-active-border-style "fg=#84a0c6"

# ── ペイン暗転 (非アクティブを暗くしてアクティブを目立たせる) ──
set -g window-style "bg=#0d0f18"
set -g window-active-style "bg=#161821"
