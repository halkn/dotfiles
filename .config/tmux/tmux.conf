# ── Basic Settings ───────────────────────────────────
set -g default-shell /bin/zsh
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g history-limit 50000

# Detach on force close (equivalent to zellij's on_force_close "detach")
set -g detach-on-destroy on

# Terminal Colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── Prefix: Ctrl-Space (avoid conflicts with Neovim) ──
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Reload Config ────────────────────────────────────
bind r source-file "${XDG_CONFIG_HOME}/tmux/tmux.conf" \; display "Reloaded"
bind ? list-keys

# ── Pane Splits ──────────────────────────────────────
bind - split-window -v -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind -n M-'\' split-window -h -c "#{pane_current_path}"
bind -n M-| split-window -h -l 70% -c "#{pane_current_path}"

# ── Window Actions ───────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind n next-window
bind p previous-window
bind d detach-client
bind z resize-pane -Z

# ── Pane Navigation (vim-style) ──────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

# ── Pane Resizing ────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Scroll / Copy Mode ───────────────────────────────
set -g mode-keys vi
set -g set-clipboard on
bind [ copy-mode

bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q      send-keys -X cancel
bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi y      send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi j      send-keys -X cursor-down
bind -T copy-mode-vi k      send-keys -X cursor-up
bind -T copy-mode-vi C-d    send-keys -X halfpage-down
bind -T copy-mode-vi C-u    send-keys -X halfpage-up
bind -T copy-mode-vi /      command-prompt -p "search:" "send-keys -X search-forward '%%'"
bind -T copy-mode-vi n      send-keys -X search-again
bind -T copy-mode-vi N      send-keys -X search-reverse

# ── Session Management ───────────────────────────────
bind -n M-s display-popup -w 70% -h 70% -E "tmux choose-tree -Zs"
bind -n M-w command-prompt -p "new session:" "new-session -A -c '#{pane_current_path}' -s '%%'"

# ── Status Bar (iceberg-dark theme) ──────────────────
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify centre
set -g status-style "bg=#161821,fg=#c6c8d1"

# Left: session name and current directory
set -g status-left-length 100
set -g status-left '#[bg=#84a0c6]#[fg=#161821]#[bold] #S #[bg=#1e2132]#[fg=#c6c8d1]#[bold] #{b:pane_current_path} #[default]'

# Right: date and time
set -g status-right-length 100
set -g status-right '#{?client_prefix,#[bg=#e27878]#[fg=#161821]#[bold] PREFIX #[default],}#{?pane_in_mode,#[bg=#e2a478]#[fg=#161821]#[bold] COPY #[default],}#{?window_zoomed_flag,#[bg=#b4be82]#[fg=#161821]#[bold] ZOOM #[default],}#{?pane_synchronized,#[bg=#a093c7]#[fg=#161821]#[bold] SYNC #[default],}#[fg=#c6c8d1]%Y-%m-%d %H:%M '

# Window list
set -g window-status-style "bg=#161821,fg=#6b7089"
set -g window-status-format " #I:#W#F "
set -g window-status-current-style "bg=#1e2132,fg=#84a0c6,bold"
set -g window-status-current-format "#[fg=#161821,bg=#84a0c6,bold] #I:#W#F #[default]"

# ── Pane Borders (equivalent to zellij's pane_frames false) ──
set -g pane-border-style "fg=#1e2132"
set -g pane-active-border-style "fg=#84a0c6"

# ── Pane Dimming (darken inactive panes to highlight the active one) ──
set -g window-style "bg=#0d0f18"
set -g window-active-style "bg=#161821"
