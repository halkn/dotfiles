onboarding = false
# 既定値: `herdr --default-config` / 反映: `herdr server reload-config`

# ── Terminal ─────────────────────────────────────────
[terminal]
new_cwd = "follow"

# ── Theme ────────────────────────────────────────────
[theme]
name = "kanagawa"

[theme.custom]
# サイドバーのspaceとagentsの区切り線を目立たせる
surface_dim = "#54546d"

# ── UI ───────────────────────────────────────────────
[ui]
mouse_capture = true
mouse_scroll_lines = 3
confirm_close = true
prompt_new_tab_name = false
pane_borders = true
pane_gaps = false
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"

# ── Session ──────────────────────────────────────────
[session]
resume_agents_on_restore = true

# ── Keybindings ──────────────────────────────────────
[keys]
prefix = "ctrl+space"
new_workspace = "alt+w"
split_vertical = "alt+;"
split_horizontal = "alt+minus"
focus_pane_left = "alt+h"
focus_pane_down = "alt+j"
focus_pane_up = "alt+k"
focus_pane_right = "alt+l"

[[keys.command]]
key = "alt+left"
type = "shell"
command = "herdr pane focus --direction left"

[[keys.command]]
key = "alt+down"
type = "shell"
command = "herdr pane focus --direction down"

[[keys.command]]
key = "alt+up"
type = "shell"
command = "herdr pane focus --direction up"

[[keys.command]]
key = "alt+right"
type = "shell"
command = "herdr pane focus --direction right"

[[keys.command]]
key = "alt+plus"
type = "shell"
command = "herdr pane split --direction right --ratio 0.3 --focus"

[[keys.command]]
key = "alt+s"
type = "popup"
command = "~/.config/herdr/herdr-picker.sh"
width = "90%"
height = "90%"

[[keys.command]]
key = "alt+d"
type = "popup"
command = "hunk diff"
width = "90%"
height = "90%"

[[keys.command]]
key = "alt+t"
type = "popup"
command = "exec \"${SHELL:-sh}\""
description = "open scratch terminal"
width = "80%"
height = "80%"
