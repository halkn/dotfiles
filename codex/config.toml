personality = "pragmatic"
file_opener = "none"

[shell_environment_policy]
inherit = "core"
exclude = [
  "OPENAI_API_KEY",
  "GITHUB_TOKEN",
  "GH_TOKEN",
]

[history]
persistence = "save-all"
max_bytes = 104857600

[tui]
notifications = true
animations = true
show_tooltips = false
alternate_screen = "auto"
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "git-branch",
  "current-dir",
  "five-hour-limit",
  "weekly-limit",
  "fast-mode",
]
