[settings.task]
# ツールインストールは mise bootstrap（packages → tools の順）に一本化する。
# task 実行前の自動インストールは新規マシンで unzip 導入前に zip 展開が走るため無効化
run_auto_install = false

[tools]
# Neovim LSP / Formatter（dotfiles 固有ファイルタイプのみ）
"pipx:shuck-cli" = "latest"
stylua = "latest"

[tool_alias]
emmylua_ls = "github:EmmyLuaLs/emmylua-analyzer-rust"
emmylua_check = "github:EmmyLuaLs/emmylua-analyzer-rust"

[tools.emmylua_ls]
version = "latest"
matching = "emmylua_ls"
rename_exe = "emmylua_ls"

[tools.emmylua_check]
version = "latest"
matching = "emmylua_check"
rename_exe = "emmylua_check"

# ── Setup（mise bootstrap） ──────────────────────────

# source は mise.toml のあるディレクトリ基準。mode = "symlink" が既定
[dotfiles]
"~/.config" = { source = ".config" }
"~/.zshenv" = { source = ".zshenv" }
"~/.codex/AGENTS.md" = { source = "codex/AGENTS.md" }
"~/.codex/rules/default.rules" = { source = "codex/rules/default.rules" }
"~/.claude/CLAUDE.md" = { source = "claude/CLAUDE.md" }
"~/.claude/settings.json" = { source = "claude/settings.json" }
"~/.claude/statusline-command.sh" = { source = "claude/statusline-command.sh" }
"~/.claude/file-suggestion.sh" = { source = "claude/file-suggestion.sh" }
"~/.claude/hooks/*" = { source = "claude/hooks/*" }

# OS パッケージ。apt は Linux、brew は macOS でのみ適用され、それ以外の
# OS では自動スキップされる。git/curl は clone 用に README の事前手順でも
# 入れるが、宣言として（冪等なので）ここにも置く。zsh/unzip/bubblewrap/
# socat は macOS では不要（zsh 標準搭載、Claude Code サンドボックスは
# Seatbelt を使用するため bubblewrap/socat 相当は不要）
[bootstrap.packages]
"apt:git" = "latest"
"apt:curl" = "latest"
"apt:zsh" = "latest"
"apt:unzip" = "latest"
"apt:bubblewrap" = "latest"
"apt:socat" = "latest"

# ログインシェル（/etc/shells 登録 + chsh を冪等に適用）
# /bin/zsh は Ubuntu（usrmerge）と macOS の両方に存在する
[bootstrap.user]
login_shell = "/bin/zsh"

[bootstrap.repos]
"~/.local/share/zsh/plugins/zsh-autosuggestions" = { url = "https://github.com/zsh-users/zsh-autosuggestions" }
"~/.local/share/zsh/plugins/fast-syntax-highlighting" = { url = "https://github.com/zdharma-continuum/fast-syntax-highlighting" }

[tasks.setup]
description = "フルセットアップ（パッケージ索引更新 → mise bootstrap → Claude Code）"
dir = "{{config_root}}"
run = "mise bootstrap --yes --update"

# mise bootstrap の最終ステップで自動実行される（冪等に保つ）
[tasks.bootstrap]
description = "Claude Code をインストール（未導入時のみ）"
run = "command -v claude >/dev/null || curl -fsSL https://claude.ai/install.sh | bash"

# ── Maintenance ──────────────────────────────────────

[tasks.sync]
description = "dotfiles と lockfile 固定の mise ツールを同期"
dir = "{{config_root}}"
run = ["git pull --ff-only", "mise install"]

[tasks.update]
description = "mise 本体・ツール・lockfile・OS パッケージ・zsh プラグイン・Claude Code を更新"
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -euo pipefail
mise self-update --yes
mise upgrade
mise bootstrap packages upgrade
mise bootstrap repos update --yes
command -v claude >/dev/null && claude update || true
"""

# ── Quality ──────────────────────────────────────────

[tasks.lint]
description = "リポジトリ検証"
depends = ["lint:zsh", "lint:shuck", "lint:md", "lint:shuck-format", "nvim"]
dir = "{{config_root}}"
run = "git diff --check"

[tasks.fmt]
description = "ファイル整形"
depends = ["nvim:fmt"]
dir = "{{config_root}}"
run = [
  "mise fmt",
  "rumdl fmt .",
  "shuck format .zshenv .config/zsh/.zshenv .config/zsh/.zshrc .config/zsh/fzf.zsh",
]

[tasks.fmt-check]
description = "整形チェック（書き換えなし）"
depends = ["lint:md", "lint:shuck-format", "nvim:fmt-check"]

[tasks."lint:zsh"]
hide = true
dir = "{{config_root}}"
run = "zsh -n .zshenv .config/zsh/.zshenv .config/zsh/.zshrc .config/zsh/fzf.zsh"

[tasks."lint:shuck"]
hide = true
dir = "{{config_root}}"
run = "shuck check .zshenv .config/zsh claude .config/herdr/herdr-picker.sh"

[tasks."lint:md"]
hide = true
dir = "{{config_root}}"
run = "rumdl check ."

[tasks."lint:shuck-format"]
hide = true
dir = "{{config_root}}"
run = "shuck format --check .zshenv .config/zsh/.zshenv .config/zsh/.zshrc .config/zsh/fzf.zsh"

[tasks.nvim]
description = "Neovim 設定の検証"
depends = ["nvim:fmt-check", "nvim:check", "nvim:startup"]

[tasks."nvim:fmt"]
hide = true
dir = "{{config_root}}"
run = "stylua .config/nvim"

[tasks."nvim:fmt-check"]
hide = true
dir = "{{config_root}}"
run = "stylua --check .config/nvim"

[tasks."nvim:check"]
hide = true
dir = "{{config_root}}"
run = """
VIMRUNTIME="$(NVIM_LOG_FILE=/dev/null nvim --clean --headless -c 'lua io.write(vim.env.VIMRUNTIME)' +q 2>/dev/null)" \\
  emmylua_check .config/nvim
"""

[tasks."nvim:startup"]
hide = true
dir = "{{config_root}}"
run = "NVIM_LOG_FILE=/dev/null nvim --headless -i NONE '+quitall'"
