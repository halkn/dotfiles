[tools]
# Neovim LSP / Formatter（dotfiles 固有ファイルタイプのみ）
lua-language-server = "latest"
stylua = "latest"
shfmt = "latest"

[tasks.link]
description = "Link dotfiles into home directories"
run = """
#!/usr/bin/env bash
set -euo pipefail
config_dir=".config"
if [[ -d "$HOME/.config" && ! -L "$HOME/.config" ]]; then
  mv "$HOME/.config" "$HOME/.config.bak.$(date +%s)"
fi
ln -snfT "$HOME/.dotfiles/$config_dir" "$HOME/.config"
ln -snf "$HOME/.dotfiles/.zshenv" "$HOME/.zshenv"
mkdir -p "$HOME/.claude"
ln -snf "$HOME/.dotfiles/claude/settings.json" "$HOME/.claude/settings.json"
ln -snf "$HOME/.dotfiles/claude/CLAUDE.md" "$HOME/.claude/CLAUDE.md"
ln -snf "$HOME/.dotfiles/claude/statusline-command.sh" "$HOME/.claude/statusline-command.sh"
mkdir -p "$HOME/.claude/hooks"
ln -snf "$HOME/.dotfiles/claude/hooks/block-python.sh" "$HOME/.claude/hooks/block-python.sh"
"""

[tasks.setup]
description = "Run setup"
run = """
#!/usr/bin/env bash
set -euo pipefail
mise run link
command -v mise >/dev/null || curl -fsSL https://mise.run | sh
mise install
plugins_dir="${XDG_DATA_HOME:-$HOME/.local/share}/zsh/plugins"
mkdir -p "$plugins_dir"
test -d "$plugins_dir/zsh-autosuggestions/.git" \
  || (rm -rf "$plugins_dir/zsh-autosuggestions" && git clone --depth=1 https://github.com/zsh-users/zsh-autosuggestions "$plugins_dir/zsh-autosuggestions")
test -d "$plugins_dir/fast-syntax-highlighting/.git" \
  || (rm -rf "$plugins_dir/fast-syntax-highlighting" && git clone --depth=1 https://github.com/zdharma-continuum/fast-syntax-highlighting "$plugins_dir/fast-syntax-highlighting")
command -v claude >/dev/null || curl -fsSL https://claude.ai/install.sh | bash
test -d "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/plugins/tpm" \
  || git clone https://github.com/tmux-plugins/tpm "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/plugins/tpm"
"""

[tasks.update]
description = "Update user-space managed tools"
run = """
#!/usr/bin/env bash
set -euo pipefail
mise upgrade
plugins_dir="${XDG_DATA_HOME:-$HOME/.local/share}/zsh/plugins"
for dir in "$plugins_dir"/*/; do
  [[ -d "${dir}.git" ]] || continue
  git -C "$dir" pull --ff-only
done
command -v claude >/dev/null && claude update || true
"""

[tasks.lint]
description = "Run repository checks that pass on the current tree"
depends = [
  "lint-zsh",
  "lint-md",
  "lint-shfmt",
  "lint-stylua",
  "lint-luals",
  "lint-nvim",
]
run = "git diff --check"

[tasks.fmt-check]
description = "Check formatting without writing files"
depends = ["lint-md", "lint-shfmt", "lint-stylua"]
run = "mise fmt --check"

[tasks.fmt]
description = "Format files with configured formatters"
run = [
  "mise fmt",
  "rumdl fmt .",
  "shfmt -w .zshenv .config/zsh/.zshenv .config/zsh/.zshrc",
  "stylua .config/nvim",
]

[tasks.lint-zsh]
hide = true
run = "zsh -n .zshenv .config/zsh/.zshenv .config/zsh/.zshrc"

[tasks.lint-md]
hide = true
run = "rumdl check ."

[tasks.lint-shfmt]
hide = true
run = "shfmt -d .zshenv .config/zsh/.zshenv .config/zsh/.zshrc"

[tasks.lint-stylua]
hide = true
run = "stylua --check .config/nvim"

[tasks.lint-luals]
hide = true
run = """
#!/usr/bin/env bash
set -euo pipefail
luals_tmp="$(mktemp -d)"
trap 'rm -rf "$luals_tmp"' EXIT
VIMRUNTIME="$(nvim --clean --headless -c 'lua io.write(vim.env.VIMRUNTIME)' +q 2>/dev/null)"
export VIMRUNTIME
lua-language-server --check=.config/nvim --checklevel=Warning --logpath="$luals_tmp/log" --metapath="$luals_tmp/meta"
"""


[tasks.lint-nvim]
hide = true
run = "NVIM_LOG_FILE=/dev/null nvim --headless -i NONE '+quitall'"
