[settings.task]
# ツールインストールは mise bootstrap（packages → tools の順）に一本化する。
# task 実行前の自動インストールは新規マシンで unzip 導入前に zip 展開が走るため無効化
run_auto_install = false

[tools]
# Neovim LSP / Formatter（dotfiles 固有ファイルタイプのみ）
lua-language-server = "latest"
stylua = "latest"
shfmt = "latest"
"github:mattn/efm-langserver" = "latest"

# ── Setup（mise bootstrap） ──────────────────────────

# source は mise.toml のあるディレクトリ基準。mode = "symlink" が既定
[dotfiles]
"~/.config" = { source = ".config" }
"~/.zshenv" = { source = ".zshenv" }
"~/.claude/CLAUDE.md" = { source = "claude/CLAUDE.md" }
"~/.claude/settings.json" = { source = "claude/settings.json" }
"~/.claude/statusline-command.sh" = { source = "claude/statusline-command.sh" }
"~/.claude/file-suggestion.sh" = { source = "claude/file-suggestion.sh" }
"~/.claude/hooks/*" = { source = "claude/hooks/*" }

# OS パッケージ。エントリは「そのマネージャがこのマシンで available か」で
# フィルタされる: apt は Debian/Ubuntu のみで macOS では自動スキップ。
# 注意: brew: は mise 内蔵の Homebrew installer（Homebrew 本体不要）で
# macOS と Linux の両方で動くため、ここに書くと Linux で apt と二重になる。
# macOS の git/curl は system 提供（Xcode CLT / 標準 curl）で足りるので
# 宣言しない。zsh/unzip/bubblewrap/socat も macOS では不要（zsh 標準搭載、
# Claude Code サンドボックスは Seatbelt を使用するため bubblewrap/socat
# 相当は不要）
[bootstrap.packages]
"apt:git" = "latest"
"apt:curl" = "latest"
"apt:zsh" = "latest"
"apt:unzip" = "latest"
"apt:bubblewrap" = "latest"
"apt:socat" = "latest"

# ログインシェル（/etc/shells 登録 + chsh を冪等に適用）
# /bin/zsh は Ubuntu（usrmerge）と macOS の両方に存在する
[bootstrap.user]
login_shell = "/bin/zsh"

[bootstrap.repos]
"~/.local/share/zsh/plugins/zsh-autosuggestions" = { url = "https://github.com/zsh-users/zsh-autosuggestions" }
"~/.local/share/zsh/plugins/fast-syntax-highlighting" = { url = "https://github.com/zdharma-continuum/fast-syntax-highlighting" }

[tasks.setup]
description = "フルセットアップ（mise bootstrap: packages → repos → dotfiles → login shell → tools → Claude Code）"
dir = "{{config_root}}"
run = "mise bootstrap --yes"

# mise bootstrap の最終ステップで自動実行される（冪等に保つ）
[tasks.bootstrap]
description = "Claude Code をインストール（未導入時のみ）"
run = "command -v claude >/dev/null || curl -fsSL https://claude.ai/install.sh | bash"

# ── Maintenance ──────────────────────────────────────

[tasks.update]
description = "mise ツール・zsh プラグイン・Claude Code を更新"
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -euo pipefail
mise upgrade & pid1=$!
mise bootstrap repos apply --yes & pid2=$!
(command -v claude && claude update || true) & pid3=$!
status=0
wait "$pid1" || status=1
wait "$pid2" || status=1
wait "$pid3" || status=1
exit "$status"
"""

# ── Quality ──────────────────────────────────────────

[tasks.lint]
description = "リポジトリ検証"
depends = [
  "lint:zsh",
  "lint:md",
  "lint:shfmt",
  "lint:stylua",
  "lint:luals",
  "lint:nvim",
]
dir = "{{config_root}}"
run = "git diff --check"

[tasks.fmt]
description = "ファイル整形"
dir = "{{config_root}}"
run = [
  "mise fmt",
  "rumdl fmt .",
  "shfmt -w .zshenv .config/zsh/.zshenv .config/zsh/.zshrc",
  "stylua .config/nvim",
]

[tasks.fmt-check]
description = "整形チェック（書き換えなし）"
depends = ["lint:md", "lint:shfmt", "lint:stylua"]

[tasks."lint:zsh"]
hide = true
dir = "{{config_root}}"
run = "zsh -n .zshenv .config/zsh/.zshenv .config/zsh/.zshrc .config/zsh/lib/*.zsh"

[tasks."lint:md"]
hide = true
dir = "{{config_root}}"
run = "rumdl check ."

[tasks."lint:shfmt"]
hide = true
dir = "{{config_root}}"
run = "shfmt -d .zshenv .config/zsh/.zshenv .config/zsh/.zshrc"

[tasks."lint:stylua"]
hide = true
dir = "{{config_root}}"
run = "stylua --check .config/nvim"

[tasks."lint:nvim"]
hide = true
dir = "{{config_root}}"
run = "NVIM_LOG_FILE=/dev/null nvim --headless -i NONE '+quitall'"
